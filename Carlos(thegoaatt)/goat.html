<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alerta</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: red;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    h1 {
      font-size: 64px;
      text-align: center;
      text-transform: uppercase;
      text-shadow: 0 0 10px red, 0 0 20px darkred, 0 0 40px red;
      animation: blink 1s infinite, zoom 2s infinite alternate;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @keyframes zoom {
      from { transform: scale(1); }
      to { transform: scale(1.08); }
    }
  </style>
</head>
<body>
  <h1>Has sido hackeado x el GOATT 😈</h1>
</body>
</html>
